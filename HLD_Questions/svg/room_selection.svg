<svg viewBox="0 0 830 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="830" height="380" rx="12" fill="#0f172a"/>
  <text x="415" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Room Selection Strategy Pattern</text>

  <!-- Request -->
  <rect x="300" y="50" width="230" height="40" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="415" y="75" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">Book(10 people, 2–3 PM)</text>

  <!-- Arrow down -->
  <line x1="415" y1="90" x2="415" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Strategy Router -->
  <rect x="310" y="120" width="210" height="40" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="415" y="145" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Strategy Router</text>

  <!-- Three arrows to strategies -->
  <line x1="340" y1="160" x2="140" y2="210" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="415" y1="160" x2="415" y2="210" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="490" y1="160" x2="690" y2="210" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- First Available -->
  <rect x="40" y="210" width="200" height="90" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="140" y="235" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">First Available</text>
  <text x="140" y="258" text-anchor="middle" fill="#94a3b8" font-size="10">Return first match</text>
  <text x="140" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">O(1) — fastest</text>
  <text x="140" y="292" text-anchor="middle" fill="#64748b" font-size="10">Best for: quick booking</text>

  <!-- Best Fit -->
  <rect x="315" y="210" width="200" height="90" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="415" y="235" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="bold">Best Fit (Capacity)</text>
  <text x="415" y="258" text-anchor="middle" fill="#94a3b8" font-size="10">Smallest room ≥ needed</text>
  <text x="415" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">ORDER BY capacity ASC</text>
  <text x="415" y="292" text-anchor="middle" fill="#64748b" font-size="10">Best for: large orgs</text>

  <!-- Least Utilized -->
  <rect x="590" y="210" width="200" height="90" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="690" y="235" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">Least Utilized</text>
  <text x="690" y="258" text-anchor="middle" fill="#94a3b8" font-size="10">Fewest bookings today</text>
  <text x="690" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Load-balanced usage</text>
  <text x="690" y="292" text-anchor="middle" fill="#64748b" font-size="10">Best for: wear balancing</text>

  <!-- Result arrow -->
  <line x1="415" y1="300" x2="415" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="310" y="340" width="210" height="30" rx="6" fill="#14532d" stroke="#34d399" stroke-width="1"/>
  <text x="415" y="360" text-anchor="middle" fill="#6ee7b7" font-size="12">✅ Selected Room Returned</text>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>