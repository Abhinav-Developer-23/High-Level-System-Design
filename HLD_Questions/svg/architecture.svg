<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="700" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Meeting Scheduler — High-Level Architecture</text>

  <!-- Clients -->
  <rect x="200" y="55" width="500" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="450" y="85" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">Clients: Web App │ Mobile App │ Calendar Plugin</text>

  <!-- Arrow: Clients → API Gateway -->
  <line x1="450" y1="105" x2="450" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="122" fill="#94a3b8" font-size="10">HTTPS/REST</text>

  <!-- API Gateway -->
  <rect x="320" y="130" width="260" height="45" rx="8" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="158" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">API Gateway (Auth, Rate Limit)</text>

  <!-- Arrows from Gateway -->
  <line x1="380" y1="175" x2="250" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="175" x2="650" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Meeting Service -->
  <rect x="120" y="220" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="244" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">Meeting Service</text>
  <text x="250" y="262" text-anchor="middle" fill="#94a3b8" font-size="11">Book, Cancel, Query, Conflict Check</text>

  <!-- Room Service -->
  <rect x="520" y="220" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#fb923c" stroke-width="1.5"/>
  <text x="650" y="244" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Room Service</text>
  <text x="650" y="262" text-anchor="middle" fill="#94a3b8" font-size="11">CRUD, Availability, Strategies</text>

  <!-- Arrows to PostgreSQL -->
  <line x1="250" y1="275" x2="400" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="275" x2="500" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="340" y="320" width="220" height="50" rx="8" fill="#1e3a5f" stroke="#f472b6" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="600">🐘 PostgreSQL (Source of Truth)</text>

  <!-- Arrow to Redis -->
  <line x1="450" y1="370" x2="450" y2="405" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Redis -->
  <rect x="340" y="405" width="220" height="50" rx="8" fill="#1e3a5f" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="435" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">⚡ Redis (Cache + Locks)</text>

  <!-- Arrow to Kafka -->
  <line x1="450" y1="455" x2="450" y2="495" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Kafka -->
  <rect x="310" y="495" width="280" height="50" rx="8" fill="#1e3a5f" stroke="#facc15" stroke-width="1.5"/>
  <text x="450" y="525" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">📨 Kafka / SQS (Notification Bus)</text>

  <!-- Arrows to Notification Services -->
  <line x1="380" y1="545" x2="250" y2="590" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="545" x2="650" y2="590" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Email Service -->
  <rect x="130" y="585" width="240" height="45" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="250" y="613" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">📧 Email Service (SES/SMTP)</text>

  <!-- Push Notification -->
  <rect x="530" y="585" width="250" height="45" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="655" y="613" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">🔔 Push Notification (FCM)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>