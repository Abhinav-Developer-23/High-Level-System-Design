<svg viewBox="0 0 850 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="850" height="420" rx="12" fill="#0f172a"/>
  <text x="425" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">2-Layer Defense Against Double-Booking</text>

  <!-- User A -->
  <rect x="60" y="55" width="160" height="35" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="140" y="77" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">👤 User A — Book 2PM</text>

  <!-- User B -->
  <rect x="630" y="55" width="160" height="35" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="710" y="77" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="600">👤 User B — Book 2PM</text>

  <!-- Layer 1 -->
  <rect x="100" y="110" width="650" height="100" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="425" y="130" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Layer 1: Redis SETNX Distributed Lock</text>

  <!-- User A acquires -->
  <rect x="130" y="145" width="220" height="25" rx="4" fill="#14532d"/>
  <text x="240" y="162" text-anchor="middle" fill="#6ee7b7" font-size="11">SETNX lock:room:R1 → ✅ Acquired</text>

  <!-- User B blocked -->
  <rect x="500" y="145" width="220" height="25" rx="4" fill="#7f1d1d"/>
  <text x="610" y="162" text-anchor="middle" fill="#fca5a5" font-size="11">SETNX lock:room:R1 → ❌ Rejected</text>

  <text x="425" y="198" text-anchor="middle" fill="#64748b" font-size="10">95% of conflicts resolved here — User B gets 409 instantly, no DB hit</text>

  <!-- Arrow down -->
  <line x1="240" y1="210" x2="240" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="256" y="230" fill="#94a3b8" font-size="10">Lock held →</text>

  <!-- Layer 2 -->
  <rect x="100" y="240" width="650" height="100" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="425" y="260" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">Layer 2: Application DB Query — Overlap Check</text>

  <rect x="130" y="275" width="350" height="25" rx="4" fill="#14532d"/>
  <text x="305" y="292" text-anchor="middle" fill="#6ee7b7" font-size="11">SELECT COUNT(*) WHERE overlap → 0 → INSERT ✅</text>

  <text x="425" y="328" text-anchor="middle" fill="#64748b" font-size="10">Safety net: even if Redis fails, DB query catches conflicts (with FOR UPDATE fallback)</text>

  <!-- Final Result -->
  <rect x="140" y="365" width="220" height="30" rx="6" fill="#14532d" stroke="#34d399" stroke-width="1"/>
  <text x="250" y="385" text-anchor="middle" fill="#6ee7b7" font-size="12">✅ User A: 201 Created</text>

  <rect x="490" y="365" width="220" height="30" rx="6" fill="#7f1d1d" stroke="#f87171" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" fill="#fca5a5" font-size="12">❌ User B: 409 Conflict</text>

  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>