<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="620" rx="12" fill="#0f172a"/>
  <text x="450" y="25" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Meeting Booking — End-to-End Sequence</text>

  <!-- Actors -->
  <rect x="70" y="45" width="80" height="30" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="110" y="65" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">Client</text>
  <line x1="110" y1="75" x2="110" y2="600" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4,4"/>

  <rect x="230" y="45" width="100" height="30" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="280" y="65" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">API Gateway</text>
  <line x1="280" y1="75" x2="280" y2="600" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4,4"/>

  <rect x="385" y="45" width="120" height="30" rx="4" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="445" y="65" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Meeting Service</text>
  <line x1="445" y1="75" x2="445" y2="600" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4,4"/>

  <rect x="560" y="45" width="80" height="30" rx="4" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="600" y="65" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Redis</text>
  <line x1="600" y1="75" x2="600" y2="600" stroke="#f87171" stroke-width="0.5" stroke-dasharray="4,4"/>

  <rect x="700" y="45" width="100" height="30" rx="4" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
  <text x="750" y="65" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">PostgreSQL</text>
  <line x1="750" y1="75" x2="750" y2="600" stroke="#f472b6" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Step 1 -->
  <line x1="110" y1="110" x2="280" y2="110" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="195" y="105" text-anchor="middle" fill="#7dd3fc" font-size="10">1. POST /meetings</text>

  <!-- Step 2 -->
  <line x1="280" y1="140" x2="445" y2="140" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="362" y="135" text-anchor="middle" fill="#6ee7b7" font-size="10">2. Validate + Auth</text>

  <!-- Step 3 -->
  <line x1="445" y1="175" x2="600" y2="175" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="522" y="170" text-anchor="middle" fill="#c4b5fd" font-size="10">3. SETNX lock:room:R1</text>
  <line x1="600" y1="195" x2="445" y2="195" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="522" y="190" text-anchor="middle" fill="#fca5a5" font-size="10">✅ Lock acquired</text>

  <!-- Step 4 -->
  <line x1="445" y1="230" x2="750" y2="230" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="598" y="225" text-anchor="middle" fill="#c4b5fd" font-size="10">4. Check: SELECT conflicts</text>
  <line x1="750" y1="250" x2="445" y2="250" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="598" y="245" text-anchor="middle" fill="#f9a8d4" font-size="10">✅ No conflicts found</text>

  <!-- Step 5 -->
  <line x1="445" y1="285" x2="750" y2="285" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="598" y="280" text-anchor="middle" fill="#c4b5fd" font-size="10">5. INSERT meeting + participants</text>
  <line x1="750" y1="305" x2="445" y2="305" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="598" y="300" text-anchor="middle" fill="#f9a8d4" font-size="10">✅ Committed (no overlap found)</text>

  <!-- Step 6 -->
  <line x1="445" y1="340" x2="600" y2="340" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="522" y="335" text-anchor="middle" fill="#c4b5fd" font-size="10">6. DEL lock:room:R1</text>

  <!-- Step 7 -->
  <line x1="445" y1="375" x2="600" y2="375" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="522" y="370" text-anchor="middle" fill="#c4b5fd" font-size="10">7. Invalidate room cache</text>

  <!-- Step 8 -->
  <rect x="420" y="400" width="180" height="25" rx="4" fill="#1e293b" stroke="#facc15" stroke-width="1"/>
  <text x="510" y="417" text-anchor="middle" fill="#fde68a" font-size="10">8. Publish → Kafka (async)</text>

  <!-- Step 9 -->
  <line x1="445" y1="445" x2="280" y2="445" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="362" y="440" text-anchor="middle" fill="#c4b5fd" font-size="10">9. Return meeting response</text>

  <line x1="280" y1="465" x2="110" y2="465" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="195" y="460" text-anchor="middle" fill="#6ee7b7" font-size="10">201 Created</text>

  <!-- Async zone -->
  <rect x="400" y="490" width="230" height="60" rx="6" fill="#1e293b" stroke="#facc15" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="515" y="510" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Async (post-response)</text>
  <text x="515" y="528" text-anchor="middle" fill="#94a3b8" font-size="10">10. Notification Service</text>
  <text x="515" y="543" text-anchor="middle" fill="#94a3b8" font-size="10">sends email/push to all participants</text>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>